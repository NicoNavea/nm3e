      - 'heading "Armónicos en redes industriales: qué son y por qué importan" [level=1] [ref=e16]'
      - paragraph [ref=e17]: Las distorsiones armónicas pueden elevar el consumo energético hasta un 30% sin que lo notes. Conoce cómo identificarlas antes de que provoquen fallas graves en tus equipos.
    - separator [ref=e18]
    - article [ref=e19]:
      - paragraph [ref=e20]: En una instalación eléctrica industrial moderna, la onda de corriente y tensión rara vez es perfectamente sinusoidal. La proliferación de variadores de frecuencia, UPS, rectificadores y fuentes conmutadas introduce distorsiones que se superponen a la señal fundamental de 50 Hz. Estas distorsiones se llaman armónicos, y su gestión es uno de los desafíos técnicos más relevantes en calidad de energía hoy.
      - heading "¿Qué son los armónicos?" [level=2] [ref=e21]
      - paragraph [ref=e22]: "Un armónico es una componente de frecuencia que es múltiplo entero de la frecuencia fundamental. En un sistema a 50 Hz, el 2.º armónico oscila a 100 Hz, el 3.º a 150 Hz, el 5.º a 250 Hz y así sucesivamente. Las cargas no lineales no consumen corriente en forma sinusoidal pura: la distorsionan, generando estas componentes adicionales que circulan por la red junto con la señal útil."
      - blockquote [ref=e23]: La métrica clave es la Distorsión Armónica Total (THD). Una THD de corriente superior al 15 % ya representa un riesgo operativo real para transformadores y cableado. La norma IEEE 519 establece límites específicos según el nivel de tensión y la potencia de cortocircuito en el punto de acoplamiento.
      - heading "Fuentes de armónicos en la industria" [level=2] [ref=e24]
      - paragraph [ref=e25]: "Los variadores de frecuencia (VFD) son la fuente más prevalente en ambientes industriales. Al rectificar la corriente alterna para luego invertirla, crean pulsos de corriente que generan principalmente el 5.º y 7.º armónico. Los rectificadores de 12 pulsos reducen estos, pero no los eliminan del todo. Otras fuentes frecuentes incluyen:"
      - list [ref=e26]:
        - listitem [ref=e27]: — UPS trifásicas de doble conversión
        - listitem [ref=e28]: — Hornos de arco eléctrico e inductivo
        - listitem [ref=e29]: — Fuentes de alimentación conmutadas en centros de datos y oficinas
        - listitem [ref=e30]: — Equipos de soldadura por resistencia
        - listitem [ref=e31]: — Cargadores de baterías industriales de alta potencia
        - listitem [ref=e32]: — Sistemas de iluminación con balastos electrónicos
      - heading "Impacto real en tu instalación" [level=2] [ref=e33]
      - paragraph [ref=e34]: "Los efectos de los armónicos no son abstractos: se traducen directamente en costos y fallas concretas. El calentamiento excesivo en transformadores y cables es el más crítico: un transformador expuesto a alta THD puede operar a temperaturas 20–30 °C por encima de su rango de diseño, reduciendo su vida útil a la mitad o menos."
      - list [ref=e35]:
        - listitem [ref=e36]: — Disparo prematuro de disyuntores termomagnéticos, que no responden correctamente a frecuencias superiores a 50 Hz
        - listitem [ref=e37]: — Resonancia capacitiva destructiva si existen bancos de corrección de factor de potencia sin reactor de desintonización
        - listitem [ref=e38]: — Errores sistemáticos en medidores de energía que subestiman el consumo real hasta un 5–8 %
        - listitem [ref=e39]: "— Interferencias en sistemas de control: PLC, SCADA, redes industriales Profibus/EtherNet/IP"
        - listitem [ref=e40]: — Sobrecorriente en el conductor de neutro en sistemas trifásicos con cargas monofásicas no lineales
        - listitem [ref=e41]: — Incremento de pérdidas técnicas en toda la red de distribución interna
      - heading "Cómo identificarlos antes de que falle el equipo" [level=2] [ref=e42]
      - paragraph [ref=e43]: La herramienta indispensable es el analizador de calidad de energía (Power Quality Analyzer). Un diagnóstico profesional incluye medición de THDv y THDi en cada tablero crítico, espectro armónico hasta el orden 50, registro continuo de al menos 7 días para capturar variaciones por turno y nivel de carga, y correlación con el historial de fallas y mantenimientos.
      - paragraph [ref=e44]: En NM3E instalamos equipos registradores durante una semana completa, entregando un informe con el espectro armónico por punto de medición, la identificación de las fuentes generadoras y un plan de mitigación priorizado por nivel de riesgo y retorno de inversión estimado.
      - heading "Soluciones disponibles" [level=2] [ref=e45]
      - paragraph [ref=e46]: "No existe una solución única: la estrategia óptima depende del nivel de THD medido, la topología de la red, el tipo de cargas y el presupuesto disponible. Las principales opciones son:"
      - list [ref=e47]:
        - listitem [ref=e48]: "— Reactancias de línea (ACL/DCL) en los VFDs: solución económica que reduce el THDi entre un 30–40 %"
        - listitem [ref=e49]: "— Filtros pasivos sintonizados: bajo costo, efectivos para armónicos específicos, pero pueden generar resonancias si cambia el perfil de cargas"
        - listitem [ref=e50]: "— Filtros activos de potencia: compensan armónicos en tiempo real con eficiencias superiores al 97 %, independientes de la carga"
        - listitem [ref=e51]: "— Transformadores de aislamiento con pantalla electrostática: atenúan el paso de armónicos hacia la red de distribución pública"
        - listitem [ref=e52]: — Configuraciones de 12 o 18 pulsos para rectificadores de gran potencia
      - blockquote [ref=e53]: Una instalación bien gestionada mantiene el THDv por debajo del 5 % en la barra principal y el THDi por debajo del 8 % en los puntos de acoplamiento común, cumpliendo con IEEE 519 y la norma chilena NCh IEC 61000-2-4.
